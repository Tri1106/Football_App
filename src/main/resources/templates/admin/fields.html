<!DOCTYPE html>
<html th:replace="~{layout :: html}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-900 mb-0">
                <i class="fas fa-tasks text-primary me-2"></i> Quản Lý Sân Thể Thao
            </h2>
            <a href="/admin/fields/add" class="btn btn-modern btn-primary-modern">
                <i class="fas fa-plus-circle me-2"></i> Thêm sân mới
            </a>
        </div>

        <div class="glass-panel overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0 border-0">
                    <thead>
                        <tr>
                            <th class="ps-4 py-3 text-primary">ID</th>
                            <th class="py-3 text-primary"><i class="fas fa-signature me-2"></i>Tên sân</th>
                            <th class="py-3 text-primary"><i class="fas fa-users me-2"></i>Loại</th>
                            <th class="py-3 text-primary"><i class="fas fa-coins me-2"></i>Giá (VNĐ/h)</th>
                            <th class="py-3 px-4 text-center text-primary">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="field : ${fields}" class="border-bottom border-white border-opacity-5 align-middle">
                            <td class="ps-4 py-3 fw-bold text-primary" th:text="${field.id}">1</td>
                            <td class="py-3 fw-bold text-white" th:text="${field.name}">Tân Sơn Nhất Stadium</td>
                            <td class="py-3">
                                <span class="badge bg-primary px-3 py-2 rounded-pill" th:text="${field.type}">Sân 5</span>
                            </td>
                            <td class="py-3">
                                <span class="fw-bold text-info" th:text="${#numbers.formatDecimal(field.price, 0, 'COMMA', 0, 'POINT')}">500,000</span>
                            </td>
                            <td class="py-3 px-4 text-center">
                                <div class="d-flex justify-content-center gap-3">
                                    <a th:href="@{/admin/fields/edit/{id}(id=${field.id})}" class="text-primary text-decoration-none hover-scale">
                                        <i class="fas fa-edit fs-5"></i>
                                    </a>
                                    <a th:href="@{/admin/fields/delete/{id}(id=${field.id})}" class="text-danger text-decoration-none hover-scale" 
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa?')">
                                        <i class="fas fa-trash-alt fs-5"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
