<!DOCTYPE html>
<html th:replace="~{layout :: html}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-900 mb-0">
                <i class="fas fa-tasks text-primary me-2"></i> Quản Lý Sân Thể Thao
            </h2>
            <a href="/admin/fields/add" class="btn btn-modern btn-primary-modern">
                <i class="fas fa-plus-circle me-2"></i> Thêm sân mới
            </a>
        </div>

        <div class="glass-panel overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0 text-white">
                    <thead class="bg-white bg-opacity-10 border-bottom border-white border-opacity-10">
                        <tr>
                            <th class="ps-4 py-3">ID</th>
                            <th class="py-3"><i class="fas fa-signature text-primary me-2"></i>Tên sân</th>
                            <th class="py-3"><i class="fas fa-users text-primary me-2"></i>Loại</th>
                            <th class="py-3"><i class="fas fa-coins text-primary me-2"></i>Giá (VNĐ/h)</th>
                            <th class="py-3 px-4 text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="field : ${fields}" class="border-bottom border-white border-opacity-5 align-middle">
                            <td class="ps-4 py-3 fw-bold text-muted" th:text="${field.id}">1</td>
                            <td class="py-3 fw-bold" th:text="${field.name}">Tân Sơn Nhất Stadium</td>
                            <td class="py-3">
                                <span class="badge bg-primary bg-opacity-20 text-primary border border-primary border-opacity-25" th:text="${field.type}">Sân 5</span>
                            </td>
                            <td class="py-3">
                                <span class="fw-bold text-secondary" th:text="${#numbers.formatDecimal(field.price, 0, 'COMMA', 0, 'POINT')}">500,000</span>
                            </td>
                            <td class="py-3 px-4 text-center">
                                <div class="btn-group gap-2">
                                    <a th:href="@{/admin/fields/edit/{id}(id=${field.id})}" class="btn btn-sm btn-outline-modern border-0 bg-white bg-opacity-5">
                                        <i class="fas fa-edit text-primary"></i>
                                    </a>
                                    <a th:href="@{/admin/fields/delete/{id}(id=${field.id})}" class="btn btn-sm btn-outline-modern border-0 bg-white bg-opacity-5" 
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa?')">
                                        <i class="fas fa-trash-alt text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
