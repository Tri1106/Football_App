<!DOCTYPE html>
<html th:replace="~{layout :: html}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-900 mb-2">
                    <i class="fas fa-list-check text-primary me-2"></i> Duyệt Đăng Ký Giải Đấu
                </h2>
                <p class="text-muted mb-0" th:if="${tournament != null}">
                    Giải đấu: <span th:text="${tournament.name}">Giải Mùa Hè</span>
                </p>
            </div>
            <div class="d-flex gap-2">
                <form th:if="${tournament != null}" th:action="@{/admin/tournaments/{id}/generate-matches(id=${tournament.id})}" method="post">
                    <button type="submit" class="btn btn-modern btn-primary-modern">
                        <i class="fas fa-shuffle me-2"></i> Xếp lịch
                    </button>
                </form>
                <a th:if="${tournament != null}" th:href="@{/admin/tournaments/{id}/matches(id=${tournament.id})}" class="btn btn-modern btn-outline-modern">
                    <i class="fas fa-futbol me-2"></i> Trận đấu
                </a>
                <a href="/admin/tournaments" class="btn btn-modern btn-outline-modern">
                    <i class="fas fa-arrow-left me-2"></i> Quay lại
                </a>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="glass-panel overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0 border-0">
                    <thead>
                        <tr>
                            <th class="ps-4 py-3 text-primary">ID</th>
                            <th class="py-3 text-primary">Đội</th>
                            <th class="py-3 text-primary">Đội trưởng</th>
                            <th class="py-3 text-primary">Ngày đăng ký</th>
                            <th class="py-3 text-primary">Trạng thái</th>
                            <th class="py-3 px-4 text-center text-primary">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="registration : ${registrations}" class="border-bottom border-white border-opacity-5 align-middle">
                            <td class="ps-4 py-3 fw-bold text-primary" th:text="${registration.id}">1</td>
                            <td class="py-3 fw-bold text-white" th:text="${registration.team.name}">FC Example</td>
                            <td class="py-3 text-muted" th:text="${registration.team.captain.username}">user1</td>
                            <td class="py-3 text-muted" th:text="${#temporals.format(registration.registrationDate, 'dd-MM-yyyy HH:mm')}">28-03-2026 15:00</td>
                            <td class="py-3">
                                <span class="badge bg-primary px-3 py-2 rounded-pill" th:text="${registration.status}">PENDING</span>
                            </td>
                            <td class="py-3 px-4 text-center">
                                <div class="d-flex justify-content-center gap-2" th:if="${registration.status.name() == 'PENDING'}">
                                    <form th:action="@{/admin/registrations/{id}/approve(id=${registration.id})}" method="post">
                                        <input type="hidden" name="tournamentId" th:value="${tournament.id}">
                                        <button type="submit" class="btn btn-sm btn-success">Duyệt</button>
                                    </form>
                                    <form th:action="@{/admin/registrations/{id}/reject(id=${registration.id})}" method="post">
                                        <input type="hidden" name="tournamentId" th:value="${tournament.id}">
                                        <button type="submit" class="btn btn-sm btn-danger">Từ chối</button>
                                    </form>
                                </div>
                                <span th:if="${registration.status.name() != 'PENDING'}" class="text-muted">Đã xử lý</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(registrations)}">
                            <td colspan="6" class="text-center py-4 text-muted">Chưa có đơn đăng ký nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
