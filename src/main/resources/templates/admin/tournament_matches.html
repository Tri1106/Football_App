<!DOCTYPE html>
<html th:replace="~{layout :: html}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-900 mb-2">
                    <i class="fas fa-futbol text-primary me-2"></i> Quản Lý Trận Đấu
                </h2>
                <p class="text-muted mb-0" th:if="${tournament != null}">
                    Giải đấu: <span th:text="${tournament.name}">Giải Mùa Hè</span>
                </p>
            </div>
            <a th:if="${tournament != null}" th:href="@{/admin/tournaments/{id}/registrations(id=${tournament.id})}" class="btn btn-modern btn-outline-modern">
                <i class="fas fa-arrow-left me-2"></i> Quay lại
            </a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="glass-panel p-4 mb-4">
            <h4 class="fw-bold mb-3">
                <i class="fas fa-calendar-plus text-primary me-2"></i> Thêm Lịch Thi Đấu Thủ Công
            </h4>
            <div th:if="${#lists.size(approvedTeams) < 2}" class="text-muted">
                Cần ít nhất 2 đội đã được duyệt để tạo lịch thi đấu thủ công.
            </div>
            <form th:if="${#lists.size(approvedTeams) >= 2}" th:action="@{/admin/tournaments/{id}/matches/manual(id=${tournament.id})}" method="post">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Đội 1</label>
                        <select name="team1Id" class="form-select form-control" required>
                            <option value="">Chọn đội 1</option>
                            <option th:each="team : ${approvedTeams}" th:value="${team.id}" th:text="${team.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Đội 2</label>
                        <select name="team2Id" class="form-select form-control" required>
                            <option value="">Chọn đội 2</option>
                            <option th:each="team : ${approvedTeams}" th:value="${team.id}" th:text="${team.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Thời gian</label>
                        <input type="datetime-local" name="startTime" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Trạng thái</label>
                        <select name="status" class="form-select form-control" required>
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${status.name() == 'SCHEDULED'}"></option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-modern btn-primary-modern w-100">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="row g-4">
            <div class="col-12" th:each="match : ${matches}">
                <div class="glass-panel p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div>
                            <h4 class="fw-bold mb-1">
                                <span th:text="${match.team1.name}">Đội A</span>
                                <span class="mx-2">vs</span>
                                <span th:text="${match.team2.name}">Đội B</span>
                            </h4>
                            <div class="text-muted small" th:text="${#temporals.format(match.startTime, 'dd-MM-yyyy HH:mm')}">28-03-2026 08:00</div>
                        </div>
                        <span class="badge bg-primary px-3 py-2 rounded-pill" th:text="${match.status}">SCHEDULED</span>
                    </div>

                    <form th:action="@{/admin/matches/{id}/result(id=${match.id})}" method="post">
                        <input type="hidden" name="tournamentId" th:value="${tournament.id}">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-2">
                                <label class="form-label">Tỉ số 1</label>
                                <input type="number" min="0" name="score1" class="form-control" th:value="${match.score1}" required>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Tỉ số 2</label>
                                <input type="number" min="0" name="score2" class="form-control" th:value="${match.score2}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Trạng thái</label>
                                <select name="status" class="form-select form-control" required>
                                    <option th:each="status : ${statuses}"
                                            th:value="${status}"
                                            th:text="${status}"
                                            th:selected="${status == match.status}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-modern btn-primary-modern w-100">
                                    <i class="fas fa-save me-2"></i> Cập nhật kết quả
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-12" th:if="${#lists.isEmpty(matches)}">
                <div class="glass-panel p-5 text-center text-muted">Chưa có trận đấu nào được xếp lịch.</div>
            </div>
        </div>
    </div>
</body>
</html>
