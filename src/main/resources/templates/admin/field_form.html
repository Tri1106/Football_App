<!DOCTYPE html>
<html th:replace="~{layout :: html}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="glass-panel p-4 p-md-5">
                    <div class="d-flex align-items-center mb-5">
                        <div class="bg-primary bg-opacity-20 p-3 rounded-4 me-3">
                            <i class="fas fa-edit text-primary fs-3"></i>
                        </div>
                        <div>
                            <h3 class="fw-900 mb-0" th:text="${field.id == null ? 'Thêm Sân Mới' : 'Chỉnh Sửa Sân'}"></h3>
                            <p class="text-muted mb-0">Cập nhật thông tin chi tiết cho sân bóng của bạn</p>
                        </div>
                    </div>

                    <form th:action="@{/admin/fields/save}" th:object="${field}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{imageUrl}">
                        
                        <div class="row g-4">
                            <div class="col-md-8">
                                <label class="form-label"><i class="fas fa-signature text-primary me-2"></i>Tên sân</label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="Ví dụ: Tân Sơn Nhất Stadium" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label"><i class="fas fa-users text-primary me-2"></i>Loại sân</label>
                                <select th:field="*{type}" class="form-select form-control">
                                    <option value="Sân 5">Sân 5 người</option>
                                    <option value="Sân 7">Sân 7 người</option>
                                    <option value="Sân 11">Sân 11 người</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label"><i class="fas fa-coins text-primary me-2"></i>Giá (VNĐ/giờ)</label>
                                <div class="input-group">
                                    <input type="number" th:field="*{price}" class="form-control" placeholder="500000" required>
                                    <span class="input-group-text border-0 bg-white bg-opacity-10 text-muted">VNĐ</span>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label"><i class="fas fa-location-dot text-primary me-2"></i>Địa chỉ</label>
                                <input type="text" th:field="*{address}" class="form-control" placeholder="Quận/Huyện, TP. HCM">
                            </div>

                            <div class="col-12">
                                <label class="form-label"><i class="fas fa-align-left text-primary me-2"></i>Mô tả</label>
                                <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Nhập mô tả chi tiết về sân..."></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label"><i class="fas fa-image text-primary me-2"></i>Ảnh sân bóng</label>
                                <div class="glass-panel p-3 border-dashed">
                                    <input type="file" name="imageFile" class="form-control border-0 bg-transparent">
                                    <div th:if="${field.imageUrl}" class="mt-3 p-2 bg-white bg-opacity-5 rounded-3 d-inline-block text-center">
                                        <img th:src="${field.imageUrl}" class="rounded-3 shadow" style="max-height: 120px; object-fit: cover;">
                                        <p class="text-muted small mt-2 mb-0">Ảnh hiện tại</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-5 d-flex gap-3">
                            <button type="submit" class="btn btn-modern btn-primary-modern px-5">
                                <i class="fas fa-save me-2"></i> Lưu Thông Tin
                            </button>
                            <a href="/admin/fields" class="btn btn-modern btn-outline-modern px-4">
                                <i class="fas fa-times me-2"></i> Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
