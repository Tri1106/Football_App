<!DOCTYPE html>
<html th:replace="~{layout :: html}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <div class="glass-panel p-4 p-md-5 overflow-hidden">
            <div class="row g-4 align-items-center">
                <div class="col-lg-6">
                    <div class="position-relative overflow-hidden rounded-4 shadow-lg">
                        <img th:src="${field.imageUrl ?: 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=800'}" 
                             class="img-fluid w-100" style="object-fit: cover; max-height: 500px;" alt="...">
                        <div class="badge bg-primary position-absolute top-0 start-0 m-4 fs-5" th:text="${field.type}">5 người</div>
                    </div>
                </div>
                <div class="col-lg-6 ps-lg-5">
                    <nav aria-label="breadcrumb" class="mb-3">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="/" class="text-primary text-decoration-none">Trang chủ</a></li>
                            <li class="breadcrumb-item active text-muted" aria-current="page">Chi tiết sân</li>
                        </ol>
                    </nav>
                    
                    <h1 class="display-5 fw-900 mb-2" th:text="${field.name}">Tên sân bóng</h1>
                    <div class="price-tag mb-4 fs-3">
                        <i class="fas fa-coins text-secondary"></i>
                        <span th:text="${#numbers.formatDecimal(field.price, 0, 'COMMA', 0, 'POINT')}">500,000</span>
                        <small class="text-muted fs-5">VNĐ/giờ</small>
                    </div>

                    <div class="glass-panel p-3 mb-4 bg-white bg-opacity-5 border-white border-opacity-10">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-primary bg-opacity-20 p-2 rounded-3 me-3">
                                <i class="fas fa-location-dot text-primary fs-5"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block">Địa chỉ</small>
                                <span class="fw-bold" th:text="${field.address}">Quận 7, TP. HCM</span>
                            </div>
                        </div>
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-20 p-2 rounded-3 me-3">
                                <i class="fas fa-users text-primary fs-5"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block">Sức chứa</small>
                                <span class="fw-bold" th:text="${field.type}">Sân 5 người</span>
                            </div>
                        </div>
                    </div>

                    <div class="mb-5">
                        <h5 class="fw-bold mb-3"><i class="fas fa-align-left text-primary me-2"></i> Mô tả sân</h5>
                        <p class="text-muted lead fs-6" th:text="${field.description}">
                            Sân bóng đá chất lượng cao với mặt cỏ nhân tạo nhập khẩu, hệ thống chiếu sáng hiện đại phục vụ cả ban đêm.
                        </p>
                    </div>

                    <div class="d-grid gap-3 d-sm-flex">
                        <button class="btn btn-modern btn-primary-modern px-5 py-3">
                            <i class="fas fa-calendar-check me-2"></i> Đặt sân ngay
                        </button>
                        <a href="/" class="btn btn-modern btn-outline-modern px-4 py-3">
                            <i class="fas fa-arrow-left me-2"></i> Quay lại
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
