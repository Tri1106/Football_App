<!DOCTYPE html>
<html th:replace="~{layout :: html}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <div class="row min-vh-75 align-items-center">
            <div class="col-md-5 mx-auto">
                <div class="glass-panel p-5">
                    <div class="text-center mb-5">
                        <i class="fas fa-user-plus text-primary fs-1 mb-3"></i>
                        <h2 class="fw-bold"><span class="text-gradient">Đăng ký</span> Thành viên</h2>
                        <p class="text-muted">Tham gia ngay để nhận ưu đãi đặt sân tốt nhất</p>
                    </div>
                    
                    <form th:action="@{/register}" th:object="${user}" method="post">
                        <div class="mb-4">
                            <label class="form-label">Tài khoản</label>
                            <input type="text" th:field="*{username}" class="form-control" placeholder="Tên đăng nhập" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="example@gmail.com" required>
                        </div>
                        <div class="mb-5">
                            <label class="form-label">Họ tên</label>
                            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A">
                        </div>
                        
                        <button type="submit" class="btn btn-modern btn-primary-modern w-100 py-3 mb-4">Tạo Tài Khoản</button>
                    </form>
                    
                    <div class="text-center">
                        <p class="mb-0 text-muted">Đã có tài khoản? <a href="/login" class="text-gradient fw-bold text-decoration-none">Đăng nhập ngay</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
