<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportBooking | Hệ thống đặt sân thể thao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-futbol"></i> HTSport
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" href="/bookings/my">Lịch sử đặt sân</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/admin/fields">Quản lý sân</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/admin/bookings">Quản lý đơn đặt</a>
                    </li>
                </ul>
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" href="/login">Đăng nhập</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-modern btn-primary-modern ms-lg-3" href="/register">Đăng ký</a>
                    </li>
                    <li class="nav-item ms-lg-3" sec:authorize="isAuthenticated()">
                        <div class="user-profile-section dropdown">
                            <a class="nav-link p-0 d-flex align-items-center dropdown-toggle no-caret" href="#" id="userDropdown" data-bs-toggle="dropdown">
                                <div class="user-avatar">
                                    <i class="fas fa-user-shield" th:if="${#authorization.expression('hasRole(''ADMIN'')')}"></i>
                                    <i class="fas fa-user" th:unless="${#authorization.expression('hasRole(''ADMIN'')')}"></i>
                                </div>
                                <span class="username-label" sec:authentication="name">admin</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-glass">
                                <li><a class="dropdown-item dropdown-item-glass" href="/profile"><i class="fas fa-id-card me-2"></i> Hồ sơ cá nhân</a></li>
                                <li><hr class="dropdown-divider border-white border-opacity-10"></li>
                                <li>
                                    <form th:action="@{/logout}" method="post">
                                        <button type="submit" class="dropdown-item dropdown-item-glass text-danger">
                                            <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                                        </button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div th:insert="~{::content}"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
