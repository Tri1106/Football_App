<!DOCTYPE html>
<html th:replace="~{layout :: html}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-900 mb-2">
                    <i class="fas fa-trophy text-primary me-2"></i> Danh Sách Giải Đấu
                </h2>
                <p class="text-muted mb-0">Theo dõi các giải đấu hiện có trong hệ thống</p>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 g-4">
            <div class="col" th:each="tournament : ${tournaments}">
                <div class="glass-card h-100">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h4 class="fw-bold mb-0" th:text="${tournament.name}">Giải Mùa Hè</h4>
                            <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${tournament.status}">UPCOMING</span>
                        </div>
                        <p class="text-muted" th:text="${tournament.description ?: 'Chưa có mô tả'}">Mô tả</p>
                        <div class="mb-3">
                            <div class="text-muted small">Bắt đầu</div>
                            <div class="fw-semibold">
                                <span th:text="${tournament.startDate}">2026-03-28</span>
                                <span th:text="${tournament.startTime}">08:00</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="text-muted small">Kết thúc</div>
                            <div class="fw-semibold">
                                <span th:text="${tournament.endDate}">2026-04-05</span>
                                <span th:text="${tournament.endTime}">17:00</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="text-muted small">Sân chính</div>
                            <div class="fw-semibold" th:text="${tournament.field != null ? tournament.field.name : 'Chưa cập nhật'}">Sân A</div>
                        </div>
                        <a th:href="@{/tournaments/{id}(id=${tournament.id})}" class="btn btn-modern btn-outline-modern">
                            <i class="fas fa-circle-info me-2"></i> Xem chi tiết
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-12" th:if="${#lists.isEmpty(tournaments)}">
                <div class="glass-panel p-5 text-center text-muted">Chưa có giải đấu nào.</div>
            </div>
        </div>
    </div>
</body>
</html>
